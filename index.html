<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Marvel Universe — Complete Watchlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --red-bright: #E74C3C;
    --gold: #D4A017;
    --bg: #080810;
    --bg2: #0e0e18;
    --bg3: #13131f;
    --border: rgba(255,255,255,0.07);
    --text: #e8e0d0;
    --muted: #666;
    --subtler: #444;
    /* Safe area insets for notched phones */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh; /* dynamic viewport height for mobile */
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Animated star-field background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 67%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,0.12) 0%, transparent 100%),
      radial-gradient(1px 1px at 91% 55%, rgba(255,255,255,0.08) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 88%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 40%, rgba(255,255,255,0.06) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 72%, rgba(255,255,255,0.09) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── STICKY HEADER ── */
  #header {
    position: sticky;
    top: 0;
    z-index: 200;
    background: linear-gradient(180deg, rgba(8,8,16,0.98) 80%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 18px 20px 14px;
    padding-top: calc(18px + var(--safe-top));
    padding-left: calc(20px + var(--safe-left));
    padding-right: calc(20px + var(--safe-right));
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    max-width: 860px;
    margin: 0 auto;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .title-block { flex: 1; min-width: 160px; }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 8vw, 58px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 0 60px rgba(192,57,43,0.4);
  }

  h1 span { color: var(--red-bright); }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--red);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Progress ring + stats */
  .progress-area {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .ring-wrap {
    position: relative;
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }

  .ring-wrap svg { transform: rotate(-90deg); }

  .ring-pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: var(--red-bright);
  }

  .stat-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px 10px;
  }

  .stat { text-align: center; }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    line-height: 1;
    color: #fff;
  }
  .stat-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Progress bar */
  .progress-bar-wrap {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--red-bright));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 120px;
    width: 100%;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px 8px 30px;
    font-family: 'Crimson Pro', serif;
    font-size: 15px; /* ≥16px prevents iOS zoom, 15px is fine with no zoom quirks */
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  #search:focus { border-color: rgba(192,57,43,0.5); }
  #search::placeholder { color: var(--subtler); }

  /* Filter row — scrollable on narrow screens */
  .filter-row {
    display: flex;
    gap: 6px;
    align-items: center;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
    flex-wrap: nowrap;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 7px 11px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
    /* Bigger touch target */
    min-height: 36px;
    display: flex;
    align-items: center;
  }

  .filter-btn:hover { border-color: var(--subtler); color: var(--text); }
  .filter-btn:active { opacity: 0.7; }

  .filter-btn.active {
    background: var(--red);
    border-color: var(--red-bright);
    color: #fff;
  }

  /* Reset btn */
  .reset-btn {
    background: transparent;
    border: 1px solid var(--subtler);
    color: var(--subtler);
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 4px;
    padding: 7px 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
    min-height: 36px;
    display: flex;
    align-items: center;
  }

  .reset-btn:hover { border-color: var(--red); color: var(--red); }
  .reset-btn:active { opacity: 0.7; }

  /* ── MAIN CONTENT ── */
  #main {
    max-width: 860px;
    margin: 0 auto;
    padding: 12px 12px 80px;
    padding-bottom: calc(80px + var(--safe-bottom));
    padding-left: calc(12px + var(--safe-left));
    padding-right: calc(12px + var(--safe-right));
    position: relative;
    z-index: 1;
  }

  /* Phase block */
  .phase {
    margin-bottom: 8px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .phase:hover { border-color: rgba(255,255,255,0.12); }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    cursor: pointer;
    background: var(--bg2);
    border-left: 3px solid var(--phase-accent, var(--red));
    user-select: none;
    transition: background 0.2s;
    /* Bigger touch target */
    min-height: 56px;
  }

  .phase-header:hover { background: var(--bg3); }
  .phase-header:active { background: var(--bg3); opacity: 0.8; }

  .phase-meta { flex: 1; min-width: 0; }

  .phase-era {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 3px;
    color: var(--phase-accent, var(--red));
    opacity: 0.75;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .phase-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: #fff;
    text-transform: uppercase;
    line-height: 1.4;
    word-break: break-word;
  }

  .phase-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .phase-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--phase-accent, var(--red));
    line-height: 1;
    text-align: right;
  }

  .mini-bar-wrap {
    width: 40px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    margin-top: 3px;
  }

  .mini-bar-fill {
    height: 100%;
    background: var(--phase-accent, var(--red));
    border-radius: 1px;
    transition: width 0.4s ease;
  }

  .chevron {
    color: var(--subtler);
    font-size: 11px;
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .phase.open .chevron { transform: rotate(180deg); }

  /* Items list */
  .phase-items {
    display: none;
    background: var(--bg);
  }

  .phase.open .phase-items { display: block; }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border-top: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: background 0.15s;
    /* Generous touch target */
    min-height: 48px;
  }

  .item:hover { background: rgba(255,255,255,0.02); }
  .item:active { background: rgba(255,255,255,0.04); }
  .item.watched { background: rgba(0,30,0,0.25); }

  /* Checkbox — larger for touch */
  .cb {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    border: 1.5px solid var(--subtler);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  .item.watched .cb {
    background: var(--phase-accent, var(--red));
    border-color: var(--phase-accent, var(--red));
    box-shadow: 0 0 8px rgba(192,57,43,0.4);
  }

  .cb-check {
    color: #fff;
    font-size: 10px;
    font-weight: 900;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .item.watched .cb-check { opacity: 1; }

  /* Item text */
  .item-body { flex: 1; min-width: 0; }

  .item-top {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    flex-wrap: wrap;
  }

  .type-icon { font-size: 12px; opacity: 0.5; flex-shrink: 0; margin-top: 2px; }

  .item-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    transition: color 0.2s, text-decoration 0.2s;
    word-break: break-word;
  }

  .item.watched .item-title {
    color: var(--subtler);
    text-decoration: line-through;
  }

  .item-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--phase-accent, var(--red));
    background: rgba(192,57,43,0.1);
    border-radius: 3px;
    padding: 2px 5px;
    opacity: 0.8;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .item.watched .item-year { opacity: 0.3; }

  .item-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
    line-height: 1.4;
  }

  .item.watched .item-note { color: var(--subtler); opacity: 0.5; }

  .type-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 1px;
    color: var(--subtler);
    flex-shrink: 0;
    margin-top: 4px;
    white-space: nowrap;
    text-transform: uppercase;
    align-self: flex-start;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-style: italic;
    font-size: 16px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px;
    padding-bottom: calc(24px + var(--safe-bottom));
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--subtler);
    text-transform: uppercase;
  }

  /* Toast — adjusted for mobile */
  .toast {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #111;
    border: 1px solid var(--red);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 10px 20px;
    border-radius: 6px;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
    white-space: nowrap;
    max-width: calc(100vw - 40px);
    text-align: center;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── MOBILE BREAKPOINTS ── */

  /* Compact phones (≤400px) */
  @media (max-width: 400px) {
    h1 { font-size: 26px; }
    .ring-wrap { width: 48px; height: 48px; }
    .ring-pct { font-size: 12px; }
    .stat-num { font-size: 17px; }
    .stat-lbl { font-size: 6px; }
    .progress-area { gap: 8px; }
    .stat-cols { gap: 2px 8px; }
    #header { padding: 14px 14px 12px; padding-top: calc(14px + var(--safe-top)); }
  }

  /* All phones (≤600px) */
  @media (max-width: 600px) {
    .header-top {
      gap: 10px;
      margin-bottom: 10px;
    }

    /* Stack search above filter buttons */
    .controls {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }

    .search-wrap {
      width: 100%;
      min-width: unset;
    }

    #search { font-size: 16px; } /* Prevent iOS auto-zoom */

    /* Filter row: horizontal scroll */
    .filter-row {
      width: 100%;
    }

    .filter-btn { padding: 7px 10px; font-size: 8px; }

    /* Items: tighter on small screens */
    .item { padding: 11px 12px; gap: 9px; }
    .phase-header { padding: 11px 12px; }
    .item-title { font-size: 14px; }
    .item-note { font-size: 11px; }

    /* Hide type badge to save space on small screens */
    .type-badge { display: none; }

    #main { padding: 10px 10px 80px; padding-bottom: calc(80px + var(--safe-bottom)); }
  }

  /* Tablet and up: restore desktop layout */
  @media (min-width: 601px) {
    .controls { flex-wrap: wrap; flex-direction: row; }
    .search-wrap { flex: 1; min-width: 140px; width: auto; }
    .filter-row { flex-wrap: wrap; overflow: visible; }
  }

  /* Landscape phone: reduce header height */
  @media (max-height: 500px) and (orientation: landscape) {
    #header { padding-top: 10px; padding-bottom: 8px; }
    .header-top { margin-bottom: 8px; }
    h1 { font-size: 24px; }
    .ring-wrap { width: 44px; height: 44px; }
    .ring-pct { font-size: 11px; }
    .stat-num { font-size: 16px; }
    .progress-bar-wrap { margin-bottom: 6px; }
  }
</style>
</head>
<body>

<div id="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="title-block">
        <div class="eyebrow">The Complete</div>
        <h1>MARVEL <span>UNIVERSE</span></h1>
        <div class="subtitle">Chronological Watchlist · All Media</div>
      </div>
      <div class="progress-area">
        <div class="ring-wrap">
          <svg width="56" height="56" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/>
            <circle id="ring-fill" cx="32" cy="32" r="26" fill="none" stroke="#E74C3C" stroke-width="4"
              stroke-dasharray="163.36" stroke-dashoffset="163.36" stroke-linecap="round" style="transition:stroke-dashoffset 0.6s ease"/>
          </svg>
          <div class="ring-pct" id="ring-pct">0%</div>
        </div>
        <div class="stat-cols">
          <div class="stat">
            <div class="stat-num" id="stat-watched">0</div>
            <div class="stat-lbl">Watched</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="stat-total">0</div>
            <div class="stat-lbl">Total</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="stat-films">0</div>
            <div class="stat-lbl">Films</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="stat-left">0</div>
            <div class="stat-lbl">Left</div>
          </div>
        </div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search" type="search" inputmode="search" placeholder="Search titles, years, notes…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      <div class="filter-row">
        <button class="filter-btn active" data-f="all">All</button>
        <button class="filter-btn" data-f="film">Films</button>
        <button class="filter-btn" data-f="series">Series</button>
        <button class="filter-btn" data-f="cartoon">Cartoons</button>
        <button class="filter-btn" data-f="short">Shorts</button>
        <button class="filter-btn" data-f="unwatched">Unwatched</button>
        <button class="filter-btn" data-f="watched">Watched</button>
        <button class="reset-btn" id="reset-btn" title="Clear all progress">Reset</button>
      </div>
    </div>
  </div>
</div>

<div id="main"></div>

<div class="footer">
  ⚡ Excelsior · Data saved in your browser · <span id="total-count"></span> titles
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'marvel-watchlist-v2';

const phases = [
  {
    id:'legacy-animated', label:'MARVEL LEGACY — CLASSIC CARTOONS', accent:'#D4A55A', era:'1966–2000',
    items:[
      {id:'c1',type:'cartoon',title:'The Marvel Super Heroes',year:'1966',note:'First Marvel animation — Cap, Thor, Hulk, Iron Man, Namor'},
      {id:'c2',type:'cartoon',title:'Spider-Man (1967)',year:'1967–1970',note:"The OG. 'Spider-Man, Spider-Man…'"},
      {id:'c3',type:'cartoon',title:'The Fantastic Four (1967)',year:'1967–1970',note:'Hanna-Barbera classic'},
      {id:'c4',type:'cartoon',title:'The New Fantastic Four (1978)',year:'1978',note:'H.E.R.B.I.E. era'},
      {id:'c5',type:'cartoon',title:'Spider-Woman (1979)',year:'1979–1980'},
      {id:'c6',type:'cartoon',title:'Spider-Man (1981)',year:'1981–1982'},
      {id:'c7',type:'cartoon',title:'Spider-Man and His Amazing Friends',year:'1981–1983',note:'Spidey teams with Iceman & Firestar'},
      {id:'c8',type:'cartoon',title:'The Incredible Hulk (1982)',year:'1982–1983'},
      {id:'c9',type:'cartoon',title:'Pryde of the X-Men (Pilot)',year:'1989',note:'Unaired pilot that led to the 90s series'},
    ]
  },
  {
    id:'legacy-xmen', label:'MARVEL LEGACY — X-MEN FILMS (FOX)', accent:'#FFD700', era:'2000–2020',
    items:[
      {id:'xm1',type:'film',title:'X-Men',year:'2000',note:'The one that started the Fox era'},
      {id:'xm2',type:'film',title:'X2: X-Men United',year:'2003'},
      {id:'xm3',type:'film',title:'X-Men: The Last Stand',year:'2006'},
      {id:'xm4',type:'film',title:'X-Men Origins: Wolverine',year:'2009'},
      {id:'xm5',type:'film',title:'X-Men: First Class',year:'2011',note:'Set in the 1960s'},
      {id:'xm6',type:'film',title:'The Wolverine',year:'2013',note:'Set in Japan'},
      {id:'xm7',type:'film',title:'X-Men: Days of Future Past',year:'2014',note:'Timeline-merging masterpiece'},
      {id:'xm8',type:'film',title:'Deadpool',year:'2016',note:'The R-rated rule-breaker'},
      {id:'xm9',type:'film',title:'X-Men: Apocalypse',year:'2016',note:'Set in the 1980s'},
      {id:'xm10',type:'film',title:'Logan',year:'2017',note:'Set in 2029 — gut-punch farewell'},
      {id:'xm11',type:'film',title:'Deadpool 2',year:'2018'},
      {id:'xm12',type:'film',title:'X-Men: Dark Phoenix',year:'2019'},
      {id:'xm13',type:'film',title:'The New Mutants',year:'2020'},
    ]
  },
  {

// ── STATE ──
let checked = {};
try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) checked = JSON.parse(raw);
} catch(e) {}

let activeFilter = 'all';
let searchVal = '';

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); } catch(e) {}
}

function typeLabel(t) {
  return {film:'Film',series:'Series',cartoon:'Cartoon',short:'Short'}[t] || t;
}

function typeEmoji(t) {
  return {film:'🎬',series:'📺',cartoon:'🎞️',short:'📹'}[t] || '▪';
}

function passesFilter(item) {
  const f = activeFilter;
  if (f === 'film' && item.type !== 'film') return false;
  if (f === 'series' && item.type !== 'series') return false;
  if (f === 'cartoon' && item.type !== 'cartoon') return false;
  if (f === 'short' && item.type !== 'short') return false;
  if (f === 'watched' && !checked[item.id]) return false;
  if (f === 'unwatched' && checked[item.id]) return false;
  if (searchVal) {
    const q = searchVal.toLowerCase();
    if (!item.title.toLowerCase().includes(q) &&
        !item.year.toLowerCase().includes(q) &&
        !(item.note||'').toLowerCase().includes(q)) return false;
  }
  return true;
}

function countTotal() {
  let t = 0;
  phases.forEach(p => p.items.forEach(() => t++));
  return t;
}

function countFilms() {
  let t = 0;
  phases.forEach(p => p.items.forEach(i => { if(i.type==='film') t++; }));
  return t;
}

function countWatched() {
  return Object.values(checked).filter(Boolean).length;
}

function updateStats() {
  const total = countTotal();
  const watched = countWatched();
  const films = countFilms();
  const pct = total ? Math.round((watched/total)*100) : 0;

  document.getElementById('stat-watched').textContent = watched;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-films').textContent = films;
  document.getElementById('stat-left').textContent = total - watched;
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';

  const circumference = 163.36;
  const offset = circumference - (circumference * pct / 100);
  document.getElementById('ring-fill').style.strokeDashoffset = offset;
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  let anyVisible = false;

  phases.forEach(phase => {
    const visItems = phase.items.filter(passesFilter);
    if (visItems.length === 0) return;
    anyVisible = true;

    const phaseWatched = phase.items.filter(i => checked[i.id]).length;
    const phaseTotal = phase.items.length;
    const phasePct = phaseTotal ? Math.round(phaseWatched/phaseTotal*100) : 0;

    const div = document.createElement('div');
    div.className = 'phase open';
    div.dataset.id = phase.id;
    div.style.setProperty('--phase-accent', phase.accent);

    div.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${phase.id}')">
        <div class="phase-meta">
          <div class="phase-era">${phase.era}</div>
          <div class="phase-title">${phase.label}</div>
        </div>
        <div class="phase-right">
          <div>
            <div class="phase-count">${phaseWatched}/${phaseTotal}</div>
            <div class="mini-bar-wrap">
              <div class="mini-bar-fill" style="width:${phasePct}%"></div>
            </div>
          </div>
          <div class="chevron">▼</div>
        </div>
      </div>
      <div class="phase-items">
        ${visItems.map(item => `
          <div class="item${checked[item.id] ? ' watched' : ''}" id="item-${item.id}" onclick="toggleItem('${item.id}')">
            <div class="cb"><span class="cb-check">✓</span></div>
            <div class="item-body">
              <div class="item-top">
                <span class="type-icon">${typeEmoji(item.type)}</span>
                <span class="item-title">${item.title}</span>
                <span class="item-year">${item.year}</span>
              </div>
              ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
            </div>
            <div class="type-badge">${typeLabel(item.type)}</div>
          </div>
        `).join('')}
      </div>
    `;
    main.appendChild(div);
  });

  if (!anyVisible) {
    main.innerHTML = '<div class="empty">No titles match your search.</div>';
  }
}

window.togglePhase = function(id) {
  const el = document.querySelector(`.phase[data-id="${id}"]`);
  if (el) el.classList.toggle('open');
};

window.toggleItem = function(id) {
  checked[id] = !checked[id];
  save();

  const el = document.getElementById('item-' + id);
  if (el) el.classList.toggle('watched', !!checked[id]);

  // Update phase counter
  const phaseEl = el?.closest('.phase');
  if (phaseEl) {
    const phaseId = phaseEl.dataset.id;
    const phase = phases.find(p => p.id === phaseId);
    if (phase) {
      const pw = phase.items.filter(i => checked[i.id]).length;
      const pt = phase.items.length;
      const pct = pt ? Math.round(pw/pt*100) : 0;
      phaseEl.querySelector('.phase-count').textContent = `${pw}/${pt}`;
      phaseEl.querySelector('.mini-bar-fill').style.width = pct + '%';
    }
  }

  updateStats();

  if (checked[id]) {
    showToast('✓ Marked as watched');
  }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Filters
document.querySelectorAll('.filter-btn[data-f]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-f]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.f;
    render();
  });
});

// Search
let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchVal = e.target.value.trim();
    render();
  }, 200);
});

// Reset
document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Clear all watch progress? This cannot be undone.')) {
    checked = {};
    save();
    render();
    updateStats();
    showToast('Progress cleared');
  }
});

// Total count
document.getElementById('total-count').textContent = countTotal();

// Init
render();
updateStats();
</script>
</body>
</html>
